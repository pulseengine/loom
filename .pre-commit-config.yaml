repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: mixed-line-ending
        args: ['--fix=lf']

  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --all -- --check
        language: system
        types: [rust]
        pass_filenames: false
      - id: cargo-clippy
        name: cargo clippy
        entry: bash -c 'Z3_SYS_Z3_HEADER=/opt/homebrew/include/z3.h cargo clippy --all-targets --all-features -- -D warnings'
        language: system
        types: [rust]
        pass_filenames: false
      - id: cargo-test
        name: cargo test (unit tests — full integration suite runs in CI)
        entry: bash -c 'Z3_SYS_Z3_HEADER=/opt/homebrew/include/z3.h cargo test --release --lib --bins'
        language: system
        types: [rust]
        pass_filenames: false
      - id: cargo-build
        name: cargo build
        entry: bash -c 'Z3_SYS_Z3_HEADER=/opt/homebrew/include/z3.h cargo build --release'
        language: system
        types: [rust]
        pass_filenames: false
      - id: rivet-validate
        name: rivet validate (advisory — rivet#129 blocks pass)
        entry: bash -c 'rivet validate || echo "rivet validate failed (known upstream issue pulseengine/rivet#129)"'
        language: system
        always_run: true
        pass_filenames: false
      - id: rivet-commit-msg
        name: rivet commit-msg-check
        entry: rivet commit-msg-check
        language: system
        stages: [commit-msg]
        always_run: true
