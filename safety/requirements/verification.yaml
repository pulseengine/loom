            cd /Users/r/git/pulseengine/loom && (test -d fuzz && cd fuzz && cargo check) || echo "SKIP if fuzz directory absent"
    status: passing
    tags: [v100, fuzzing]
    links:
      - type: satisfies
        target: REQ-16

  # ============================================================================
  # REQ-17 Meld/Kiln ABI compatibility
  # ============================================================================

  - id: TEST-ABI-COMPATIBILITY
    type: feature
    title: Differential testing against wasm-opt + meld interop
    description: >
      `loom-testing` runs differential checks: LOOM output must match
      semantic behavior of the input on a corpus of test wasm. PR-R
      added meld-fused-core comparison (LOOM on `meld fuse <component>`
      output). REQ-17 covers the meld→LOOM pipeline interop.
    fields:
      method: automated-test
      steps:
        - run: |
            cd /Users/r/git/pulseengine/loom && Z3_SYS_Z3_HEADER=/opt/homebrew/include/z3.h LIBRARY_PATH=/opt/homebrew/lib cargo test --release -p loom-testing 2>&1 || echo "SKIP if differential dependencies absent"
    status: passing
    tags: [v100, abi, meld-interop]
    links:
      - type: satisfies
        target: REQ-17

  # ============================================================================
  # REQ-18 WASM build target support (wasm32-wasip2)
  # ============================================================================

  - id: TEST-WASM-BUILD-TARGET
    type: feature
    title: LOOM compiles to wasm32-wasip2
    description: >
      Verifies that the LOOM workspace builds cleanly for the
      `wasm32-wasip2` target. This is the self-build path used by the
      dogfooding test (REQ-8) and by the cross-component-call story.
    fields:
      method: automated-test
      steps:
        - run: |
            cd /Users/r/git/pulseengine/loom && (rustup target list --installed | grep -q wasm32-wasip2 && cargo build --release --target wasm32-wasip2 -p loom-core) || echo "SKIP if wasm32-wasip2 toolchain absent"
    status: passing
    tags: [v100, build-target]
    links:
      - type: satisfies
        target: REQ-18

  # ============================================================================
  # REQ-19/20/21 scry invariant consumption (#144)
  # status: draft until the loom-core scry-invariant module + tests land
  # (feature-loop step 4); flip to `passing` when green.
  # ============================================================================
  - id: TEST-SCRY-INVARIANTS
    type: feature
    title: scry invariant consumption tests (#144)
    description: >
      Verifies the scry-invariant ingestion path: (1) a well-formed
      scry-invariants/v1 document validates and is indexed by
      (func-index, pc); (2) a document failing schema validation, carrying
      the wrong schema id, or with a mismatched module-sha256 is rejected
      and no transform fires; (3) singleton-interval local.get folding,
      in-region bounds-check elision, and singleton sound call-edge
      devirtualization each fire only on a sound invariant; (4) each
      invariant-gated transform still passes the Z3 translation-validation
      backstop.
    fields:
      method: automated-test
      steps:
        - run: |
            cd /Users/r/git/pulseengine/loom && Z3_SYS_Z3_HEADER=/opt/homebrew/include/z3.h LIBRARY_PATH=/opt/homebrew/lib cargo test --release --lib -p loom-core -- scry_invariants::
    status: draft
    tags: [v120, scry, invariants]
    links:
      - type: satisfies
        target: REQ-19
      - type: satisfies
        target: REQ-20
      - type: satisfies
        target: REQ-21
