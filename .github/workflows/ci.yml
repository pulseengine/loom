name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rivet-validate:
    name: Rivet Artifact Traceability
    runs-on: [self-hosted, linux, x64, rust-cpu]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: rivet
      - name: Install rivet
        run: cargo install --git https://github.com/pulseengine/rivet.git --tag v0.3.1 rivet-cli
      - name: Validate artifacts
        run: rivet validate || echo "::warning::rivet validate failed (known upstream issue pulseengine/rivet#129)"
      - name: Check traceability coverage
        run: rivet coverage
      - name: Artifact statistics
        run: rivet stats

  format:
    name: Format
    runs-on: [self-hosted, linux, x64, light]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    # Stays on ubuntu-latest: requires `sudo apt-get install z3`; Z3 is not
    # provisioned on smithy hosts. Migrate once smithy ships z3 in toolchains.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install Z3
        run: |
          sudo apt-get update
          sudo apt-get install -y z3
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test
    # Stays on ubuntu-latest: matrix spans macOS + Windows; smithy is Linux-only.
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --all --release --verbose

  build:
    name: Build
    # Stays on ubuntu-latest: matrix spans macOS + Windows; smithy is Linux-only.
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release
        run: cargo build --release --verbose
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: loom-${{ matrix.os }}
          path: |
            target/release/loom
            target/release/loom.exe

  validate:
    name: Validate WebAssembly Output
    runs-on: [self-hosted, linux, x64, rust-cpu]
    needs: build
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-tools
        run: cargo install wasm-tools
      - name: Build loom
        run: cargo build --release
      - name: Optimize and validate test fixtures
        run: |
          mkdir -p /tmp/loom-optimized

          # All fixture tests now pass with Z3 verification!
          # CSE and simplify_locals bugs have been fixed.
          KNOWN_FAILURES=()

          unexpected_failures=()
          success_count=0

          for fixture in tests/fixtures/*.wat; do
            filename=$(basename "$fixture" .wat)
            output_file="/tmp/loom-optimized/${filename}.wasm"

            # Check if this is a known failure
            is_known_failure=false
            for known in "${KNOWN_FAILURES[@]}"; do
              if [ "$filename" = "$known" ]; then
                is_known_failure=true
                break
              fi
            done

            if ! ./target/release/loom optimize "$fixture" -o "$output_file" > /dev/null 2>&1; then
              if [ "$is_known_failure" = true ]; then
                echo "⚠️  $filename (known Z3 verification failure - tracked)"
              else
                echo "❌ $filename (UNEXPECTED FAILURE)"
                unexpected_failures+=("$filename")
              fi
              continue
            fi

            if ! wasm-tools validate "$output_file" > /dev/null 2>&1; then
              echo "❌ $filename (output validation failed)"
              unexpected_failures+=("$filename")
              continue
            fi

            echo "✅ $filename"
            success_count=$((success_count + 1))
          done

          echo ""
          echo "Results: $success_count passed, ${#KNOWN_FAILURES[@]} known failures, ${#unexpected_failures[@]} unexpected"

          if [ ${#unexpected_failures[@]} -gt 0 ]; then
            echo "❌ Unexpected failures:"
            for f in "${unexpected_failures[@]}"; do
              echo "  - $f"
            done
            exit 1
          fi

          echo "✅ All tests passed (known failures tracked for fixing)"

  coverage:
    name: Code Coverage
    # Stays on ubuntu-latest: uses `sudo rm -rf` to free disk space on the
    # GitHub-hosted image. Could migrate by dropping the free-disk step
    # (smithy has plenty of disk via lv_runners) but leaving as-is for now.
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          df -h
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          key: coverage
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage
        # Exclude verification feature - it's tested separately in z3-verification job
        # and Z3 compilation + LLVM instrumentation together exhaust disk space
        run: cargo llvm-cov --lcov --output-path lcov.info
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./lcov.info
          fail_ci_if_error: false

  benchmark:
    name: Benchmarks
    runs-on: [self-hosted, linux, x64, rust-cpu]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          # Use separate cache for benchmarks (no verification)
          key: bench-no-verify
      - name: Run benchmarks
        # Disable verification for benchmarks - we're measuring optimization perf
        run: cargo bench --no-fail-fast --no-default-features

  verify:
    name: Z3 Verification Build
    # Stays on ubuntu-latest: requires `sudo apt-get install z3`; Z3 is not
    # provisioned on smithy hosts. Migrate once smithy ships z3.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Z3
        run: |
          sudo apt-get update
          sudo apt-get install -y z3
      - name: Build with verification feature
        run: cargo build --release --features verification
      - name: Test verification
        run: |
          # Use bench_compare.wat which passes all verification
          ./target/release/loom optimize tests/fixtures/bench_compare.wat \
            -o /tmp/test.wasm --verify --stats
      - name: Verify all fixtures with Z3
        run: |
          verified=0
          skipped=0
          for fixture in tests/fixtures/*.wat; do
            filename=$(basename "$fixture")
            echo "Verifying: $filename"
            if ./target/release/loom optimize "$fixture" -o /tmp/verified_output.wasm --verify --stats 2>&1; then
              verified=$((verified + 1))
            else
              echo "Z3 verification issue: $filename (non-fatal, tracking coverage)"
              skipped=$((skipped + 1))
            fi
          done
          echo ""
          echo "Z3 fixture verification: $verified verified, $skipped skipped"
      - name: Verify WASM test files with Z3
        run: |
          verified=0
          skipped=0
          found=false
          for wasm_file in tests/*.wasm; do
            [ -f "$wasm_file" ] || continue
            found=true
            filename=$(basename "$wasm_file")
            echo "Verifying: $filename"
            if ./target/release/loom optimize "$wasm_file" -o /tmp/verified_output.wasm --verify --stats 2>&1; then
              verified=$((verified + 1))
            else
              echo "Z3 verification issue: $filename (non-fatal, tracking coverage)"
              skipped=$((skipped + 1))
            fi
          done
          if [ "$found" = false ]; then
            echo "No .wasm test files found (skipping)"
          else
            echo ""
            echo "Z3 WASM verification: $verified verified, $skipped skipped"
          fi

  wasm-build:
    name: WASM Build (wasm32-wasip2 with Z3)
    # Stays on ubuntu-latest: installs wasi-sdk into /opt with sudo mkdir/tar.
    # Could migrate by extracting into $HOME, but skipping until needed.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Pin to Rust 1.93.1 for WASM build — Rust 1.94.0 bundles a
      # wasm-component-ld that generates __wasi_init_tp imports which the
      # wasip2 component model cannot resolve with wasi-sdk-25.
      # Last known working: 1.93.1 (2026-02-11), confirmed in CI run 22541892477.
      # TODO: Unpin when Rust stable + wasi-sdk resolves the wasip2 thread init issue.
      - uses: dtolnay/rust-toolchain@1.93.1
        with:
          targets: wasm32-wasip2
      - uses: Swatinem/rust-cache@v2
        with:
          key: wasm-z3-build-1.93.1

      - name: Install wasi-sdk
        run: |
          WASI_SDK_VERSION=25
          wget -q https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${WASI_SDK_VERSION}/wasi-sdk-${WASI_SDK_VERSION}.0-x86_64-linux.tar.gz -O wasi-sdk.tar.gz
          sudo mkdir -p /opt/wasi-sdk
          sudo tar -xzf wasi-sdk.tar.gz -C /opt/wasi-sdk --strip-components=1
          rm wasi-sdk.tar.gz

      - name: Build loom for wasm32-wasip2
        env:
          # pulseengine/z3.rs wasi-sdk-support branch handles Z3 build internally
          WASI_SDK_PREFIX: /opt/wasi-sdk
        run: |
          cargo +1.93.1 build --release --target wasm32-wasip2 --package loom-cli

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: loom-wasm
          path: target/wasm32-wasip2/release/loom.wasm

  self-optimization:
    name: Self-Optimization Test
    runs-on: [self-hosted, linux, x64, rust-cpu]
    needs: [build, wasm-build]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-tools
        run: cargo install wasm-tools
      - name: Download LOOM binary
        uses: actions/download-artifact@v4
        with:
          name: loom-ubuntu-latest
          path: ./loom-bin
      - name: Download LOOM WASM
        uses: actions/download-artifact@v4
        with:
          name: loom-wasm
          path: ./loom-wasm
      - name: Make binary executable
        run: chmod +x ./loom-bin/loom
      - name: Test self-optimization
        run: |
          echo "Testing LOOM self-optimization (dogfooding)..."
          INPUT="./loom-wasm/loom.wasm"
          OUTPUT="/tmp/loom-optimized.wasm"

          # Verify input is valid
          wasm-tools validate "$INPUT" || { echo "Input validation failed"; exit 1; }

          # Optimize LOOM with itself
          ./loom-bin/loom optimize "$INPUT" -o "$OUTPUT" --stats || { echo "Optimization failed"; exit 1; }

          # Verify output is valid
          wasm-tools validate "$OUTPUT" || { echo "Output validation failed"; exit 1; }

          # Calculate size reduction
          INPUT_SIZE=$(stat -f%z "$INPUT" 2>/dev/null || stat -c%s "$INPUT")
          OUTPUT_SIZE=$(stat -f%z "$OUTPUT" 2>/dev/null || stat -c%s "$OUTPUT")
          REDUCTION=$((100 * (INPUT_SIZE - OUTPUT_SIZE) / INPUT_SIZE))

          echo "✅ Self-optimization successful!"
          echo "   Input:  $INPUT_SIZE bytes"
          echo "   Output: $OUTPUT_SIZE bytes"
          echo "   Reduction: $REDUCTION%"

  rocq-proofs:
    name: Rocq Formal Proofs
    # Stays on ubuntu-latest: requires Nix + Bazel; both are out-of-scope for
    # smithy phase 1 (see migration playbook "What's currently out of scope").
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.14.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-rocq
          repository-cache: true
      - name: Build proofs
        run: bazel build //proofs/...
      - name: Test proofs
        run: bazel test //proofs/... --test_output=errors

  differential:
    name: Differential Testing (vs wasm-opt)
    # Stays on ubuntu-latest: requires `sudo apt-get install binaryen`;
    # binaryen/wasm-opt is not provisioned on smithy hosts.
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-opt and wasm-tools
        run: |
          sudo apt-get update
          sudo apt-get install -y binaryen
          cargo install wasm-tools || true
      - name: Build LOOM
        run: cargo build --release
      - name: Run differential comparison
        run: |
          echo "## Differential Testing: LOOM vs wasm-opt" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Original | LOOM | wasm-opt -O3 | LOOM valid | wasm-opt valid |" >> $GITHUB_STEP_SUMMARY
          echo "|------|----------|------|-------------|------------|----------------|" >> $GITHUB_STEP_SUMMARY

          loom_wins=0
          wopt_wins=0
          ties=0
          failures=0

          for fixture in tests/fixtures/*.wat; do
            filename=$(basename "$fixture")
            orig_size=$(wc -c < "$fixture")

            # Optimize with LOOM
            if ./target/release/loom optimize "$fixture" -o /tmp/loom_out.wasm 2>/dev/null; then
              loom_size=$(wc -c < /tmp/loom_out.wasm)
              loom_valid="yes"
              wasm-tools validate /tmp/loom_out.wasm 2>/dev/null || loom_valid="INVALID"
            else
              loom_size="-"
              loom_valid="error"
            fi

            # First compile WAT to WASM for wasm-opt
            if wasm-tools parse "$fixture" -o /tmp/orig.wasm 2>/dev/null; then
              orig_wasm_size=$(wc -c < /tmp/orig.wasm)

              # Optimize with wasm-opt
              if wasm-opt -O3 /tmp/orig.wasm -o /tmp/wopt_out.wasm 2>/dev/null; then
                wopt_size=$(wc -c < /tmp/wopt_out.wasm)
                wopt_valid="yes"
                wasm-tools validate /tmp/wopt_out.wasm 2>/dev/null || wopt_valid="INVALID"
              else
                wopt_size="-"
                wopt_valid="error"
              fi
            else
              orig_wasm_size="-"
              wopt_size="-"
              wopt_valid="skip"
            fi

            # CRITICAL: If LOOM output is invalid but wasm-opt is valid, that's a bug
            if [ "$loom_valid" = "INVALID" ] && [ "$wopt_valid" = "yes" ]; then
              echo "::error::LOOM produced invalid WASM for $filename but wasm-opt succeeded"
              failures=$((failures + 1))
            fi

            echo "| $filename | $orig_size | $loom_size | $wopt_size | $loom_valid | $wopt_valid |" >> $GITHUB_STEP_SUMMARY
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Failures (LOOM invalid where wasm-opt valid): $failures" >> $GITHUB_STEP_SUMMARY

          # Fail CI if LOOM produced invalid output where wasm-opt succeeded
          if [ "$failures" -gt 0 ]; then
            echo "::error::$failures differential test failures detected"
            exit 1
          fi
