name: Release

# Release variant: serialize per-tag, never cancel. A cancelled release
# mid-publish leaves the GitHub Release page, build attestations, and
# per-target binary archives in an inconsistent state — better to queue
# than abort. Mirrors the pulseengine/synth / rivet / witness release
# workflows.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

on:
  push:
    tags:
      - "v*"
  # Manual re-run for a tag whose initial run failed partway. The tag
  # must already exist; this does not create tags.
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to (re)build (e.g. v1.1.2)"
        required: true
        type: string

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Cross-platform binary builds ──────────────────────────────────────
  # loom-cli is the binary `loom`. The release build pulls in loom-core
  # which depends on z3-sys; z3-sys vendors and statically compiles z3,
  # so no host libz3 is required on the runner. The build succeeds on
  # every target in the CI matrix.
  #
  # No aarch64-linux for now: the rocq-of-rust + bazel/nix stack used by
  # the Rocq Formal Proofs job already constrains this repo's CI runners,
  # and cross-compiling z3-sys for aarch64-linux is untested. Add it as
  # a follow-up once the standard matrix is green again.
  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            binary: loom
          # x86_64-apple-darwin cross-compiles on the arm64 macos-14
          # runner — matches pulseengine/synth, rivet, witness.
          - target: x86_64-apple-darwin
            os: macos-14
            archive: tar.gz
            binary: loom
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
            binary: loom
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
            binary: loom.exe
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build loom (native)
        run: cargo build --release --target ${{ matrix.target }} -p loom-cli

      - name: Strip binary
        if: runner.os != 'Windows'
        run: strip "target/${{ matrix.target }}/release/${{ matrix.binary }}" 2>/dev/null || true

      - name: Package archive
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          BINARY: ${{ matrix.binary }}
          ARCHIVE_KIND: ${{ matrix.archive }}
          # Resolve the version once: tag push -> refs/tags/vX.Y.Z;
          # workflow_dispatch -> the user-supplied tag input. Bound via
          # env: and dereferenced as $VERSION below — never expand
          # ${{ ... }} directly inside run: (command-injection vector).
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          VERSION="${INPUT_TAG:-${GITHUB_REF#refs/tags/}}"
          ARCHIVE="loom-${VERSION}-${TARGET}.${ARCHIVE_KIND}"
          mkdir -p staging
          cp "target/${TARGET}/release/${BINARY}" staging/
          cp README.md LICENSE staging/ 2>/dev/null || true
          if [ "$ARCHIVE_KIND" = "zip" ]; then
            (cd staging && 7z a -tzip "../$ARCHIVE" ./*)
          else
            tar -czf "$ARCHIVE" -C staging .
          fi
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}
          retention-days: 7

  # ── Create the GitHub Release: checksums, provenance, signing ─────────
  # Verbatim from pulseengine/synth's release.yml Phase-6 block, only the
  # SBOM manifest path is adapted (loom-cli/Cargo.toml vs.
  # crates/synth-cli/Cargo.toml).
  create-release:
    name: Create GitHub Release
    needs: [build-binaries]
    runs-on: ubuntu-latest
    permissions:
      # Keyless signing + provenance need an OIDC token; release-asset
      # upload needs contents: write; build provenance attestation
      # needs attestations: write. Mirrors pulseengine/synth.
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Flatten release assets
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec cp {} release-assets/ \;
          ls -la release-assets/

      # Phase 6: CycloneDX SBOM for the loom toolchain itself. The SBOM
      # is generated *before* SHA256SUMS so its digest is captured in
      # the checksum manifest; the cosign signature over SHA256SUMS.txt
      # transitively covers the SBOM.
      - name: Install cargo-cyclonedx
        run: cargo install --locked cargo-cyclonedx

      - name: Generate toolchain SBOM (CycloneDX)
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          VERSION="${INPUT_TAG:-${GITHUB_REF#refs/tags/}}"
          BARE="${VERSION#v}"
          # cargo-cyclonedx doesn't proxy cargo's `-p` package-selection
          # flag; target loom-cli's manifest directly. The generated
          # SBOM lands next to that Cargo.toml.
          cargo cyclonedx \
            --manifest-path loom-cli/Cargo.toml \
            --format json \
            --spec-version 1.5
          SBOM_SRC="loom-cli/loom-cli.cdx.json"
          if [ ! -f "$SBOM_SRC" ]; then
            SBOM_SRC=$(find loom-cli -maxdepth 2 -name '*.cdx.json' | head -1)
          fi
          test -n "$SBOM_SRC" && test -f "$SBOM_SRC"
          cp "$SBOM_SRC" "release-assets/loom-${BARE}.cdx.json"
          echo "::notice::Toolchain SBOM written to release-assets/loom-${BARE}.cdx.json"
          ls -la release-assets/

      - name: Generate SHA256 checksums
        run: |
          set -euo pipefail
          cd release-assets
          sha256sum ./* > SHA256SUMS.txt
          cat SHA256SUMS.txt

      # ── SLSA build provenance (GitHub-native) ──────────────────────────
      # actions/attest-build-provenance generates an in-toto SLSA v1
      # provenance statement for every binary archive, signs it keyless
      # via Sigstore (Fulcio cert bound to this workflow's OIDC
      # identity), and records it in the Rekor transparency log.
      # Consumers verify with `gh attestation verify <file> --repo
      # pulseengine/loom`.
      - name: Generate SLSA build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            release-assets/*.tar.gz
            release-assets/*.zip

      # ── Sigstore keyless signing (cosign) ──────────────────────────────
      # Signs SHA256SUMS.txt so a consumer can verify the checksum file
      # itself was produced by this workflow (closes the gap where an
      # attacker who can replace a release asset could also replace the
      # plain checksum file). The .cosign.bundle is the verifier-friendly
      # artifact; .sig + .pem are the detached signature and Fulcio
      # certificate. Verify with:
      #   cosign verify-blob \
      #     --certificate-identity-regexp \
      #       'https://github.com/pulseengine/loom/.github/workflows/release.yml@.*' \
      #     --certificate-oidc-issuer \
      #       'https://token.actions.githubusercontent.com' \
      #     --bundle SHA256SUMS.txt.cosign.bundle \
      #     SHA256SUMS.txt
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.4.1'

      - name: Sign SHA256SUMS with cosign (keyless OIDC)
        run: |
          set -euo pipefail
          cd release-assets
          cosign sign-blob \
            --yes \
            --bundle SHA256SUMS.txt.cosign.bundle \
            --output-signature SHA256SUMS.txt.sig \
            --output-certificate SHA256SUMS.txt.pem \
            SHA256SUMS.txt
          echo "::notice::SHA256SUMS signed via Sigstore keyless flow."
          ls -la ./*

      - name: Capture build environment
        run: |
          set -euo pipefail
          {
            echo "rustc: $(rustc --version)"
            echo "cargo: $(cargo --version)"
            echo "cosign: $(cosign version 2>&1 | head -1)"
            echo "runner: $(uname -srm)"
          } > release-assets/build-env.txt
          cat release-assets/build-env.txt

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Untrusted-input safety: the tag name flows in via env: and is
          # dereferenced through $VERSION, never expanded into the shell.
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          VERSION="${INPUT_TAG:-${GITHUB_REF#refs/tags/}}"
          # Idempotent: re-running the workflow for an existing release
          # uploads/overwrites assets rather than failing. --clobber lets
          # a re-run replace assets a previous partial run left behind.
          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "::notice::Release $VERSION exists; uploading assets"
            gh release upload "$VERSION" --clobber release-assets/*
          else
            echo "::notice::Creating Release $VERSION with assets"
            gh release create "$VERSION" \
              --title "loom $VERSION" \
              --generate-notes \
              release-assets/*
          fi
